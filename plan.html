    <section class="content-card hero-card">
      <p class="eyebrow">第二頁</p>
      <h1>我的規劃</h1>
      <p class="lead">這裡先放整體方向摘要。之後可補上理想職務、工作分析、自傳內容，以及長短期充實計畫。</p>
    </section>

    <section class="content-card">
      <h2>1. 工作需求等資訊</h2>

      </p>

      <h2>2. 自傳</h2>

        這裡先放自傳占位文字。之後可補上你的學習動機、經驗整理、為何適合這份工作等內容。
      </p>
    </section>

    <section class="content-card">
      <h2>3. 長短期規劃</h2>
      <p>
        這裡先放規劃占位文字。之後可補上修課計畫、研習、證照、社團、專題、實作目標等內容。
      </p>
